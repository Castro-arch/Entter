services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: entter
      POSTGRES_PASSWORD: entter
      POSTGRES_DB: entter
    ports:
      - "5432:5432"
    volumes:
      - entter_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  entter_postgres_data:
